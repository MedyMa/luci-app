name: Build luci-app-adguardhome

on:
  workflow_dispatch:
    inputs:
      openwrt_target:
        description: OpenWrt target
        required: false
        default: 'mediatek'
      openwrt_subtarget:
        description: OpenWrt subtarget
        required: false
        default: 'filogic'
      publish_release:
        description: Publish built packages to GitHub Releases
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag to use when publishing from workflow_dispatch (for example: adguardhome-v0.1.0)'
        required: false
        default: ''
  push:
    tags:
      - 'adguardhome-v*'
    paths:
      - '.github/workflows/build-luci-app-adguardhome.yml'
      - 'luci-app-adguardhome/**'
      - 'Luci-app/luci-app-adguardhome/**'
  pull_request:
    paths:
      - '.github/workflows/build-luci-app-adguardhome.yml'
      - 'luci-app-adguardhome/**'
      - 'Luci-app/luci-app-adguardhome/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_profile: 24.10-ipk
            sdk_distribution: immortalwrt
            openwrt_version: 24.10.6
            pkg_format: ipk
          - build_profile: 25.12-apk
            sdk_distribution: immortalwrt
            openwrt_version: 25.12-SNAPSHOT
            pkg_format: apk

    env:
      BUILD_PROFILE: ${{ matrix.build_profile }}
      SDK_DISTRIBUTION: ${{ matrix.sdk_distribution }}
      OPENWRT_VERSION: ${{ matrix.openwrt_version }}
      OPENWRT_TARGET: ${{ inputs.openwrt_target || 'mediatek' }}
      OPENWRT_SUBTARGET: ${{ inputs.openwrt_subtarget || 'filogic' }}
      PKG_FORMAT: ${{ matrix.pkg_format }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            subversion \
            swig \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      - name: Download SDK
        run: |
          set -eux
          case "$SDK_DISTRIBUTION" in
            openwrt)
              sdk_base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
              sdk_prefix='openwrt-sdk'
              sdk_ext='.tar.zst'
              ;;
            immortalwrt)
              if echo "$OPENWRT_VERSION" | grep -q 'SNAPSHOT'; then
                sdk_base_url="https://downloads.immortalwrt.org/snapshots/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
              else
                sdk_base_url="https://downloads.immortalwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
              fi
              sdk_prefix='immortalwrt-sdk'
              sdk_ext='.tar.zst'
              ;;
            *)
              echo "Unsupported SDK distribution: $SDK_DISTRIBUTION" >&2
              exit 1
              ;;
          esac

          sdk_target_id="${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}"

          _find_sdk() {
            local base_url="$1" prefix="$2" ver="$3" tid="$4" ext="$5"
            local page sdk_fname gcc_ver

            # Strategy 1: scrape directory listing (fastest when CDN cooperates)
            page="$(curl -sSL --retry 2 --retry-delay 5 --max-time 30 "$base_url/" 2>/dev/null || true)"
            if [ -n "$page" ]; then
              sdk_fname="$(printf '%s\n' "$page" | grep -oE "${prefix}-${ver}-${tid}_[^\"]+${ext}" | head -n1)"
              [ -z "$sdk_fname" ] && sdk_fname="$(printf '%s\n' "$page" | grep -oE "${prefix}-${tid}_[^\"]+${ext}" | head -n1)"
              [ -n "$sdk_fname" ] && printf '%s\n' "$sdk_fname" && return 0
            fi

            # Strategy 2: probe common GCC versions (bypasses CDN listing issues)
            for gcc_ver in 14.3.0 14.2.0 14.1.0 13.3.0 13.2.0 12.3.0 12.2.0 11.4.0 11.3.0; do
              sdk_fname="${prefix}-${ver}-${tid}_gcc-${gcc_ver}_musl.Linux-x86_64${ext}"
              if wget --spider -q --timeout=10 "$base_url/$sdk_fname" 2>/dev/null; then
                printf '%s\n' "$sdk_fname" && return 0
              fi
              sdk_fname="${prefix}-${tid}_gcc-${gcc_ver}_musl.Linux-x86_64${ext}"
              if wget --spider -q --timeout=10 "$base_url/$sdk_fname" 2>/dev/null; then
                printf '%s\n' "$sdk_fname" && return 0
              fi
            done

            return 1
          }

          sdk_file="$(_find_sdk "$sdk_base_url" "$sdk_prefix" "$OPENWRT_VERSION" "$sdk_target_id" "$sdk_ext")"
          test -n "$sdk_file"
          echo "Found SDK: $sdk_file"
          wget -q --timeout=30 --tries=5 "$sdk_base_url/$sdk_file" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          sdk_dir="$(find . -maxdepth 1 -type d -name "${sdk_prefix}-*" | head -n1)"
          test -n "$sdk_dir"
          echo "SDK_DIR=$sdk_dir" >> "$GITHUB_ENV"

      - name: Update feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          ./scripts/feeds update -a

      - name: Inject package into LuCI feed
        run: |
          set -eux
          package_makefile="$(find "$GITHUB_WORKSPACE" -type f -name Makefile \
            -not -path "$GITHUB_WORKSPACE/.git/*" \
            -not -path "$GITHUB_WORKSPACE/openwrt-sdk-*/*" \
            -not -path "$GITHUB_WORKSPACE/immortalwrt-sdk-*/*" \
            -print | while IFS= read -r candidate; do
              if sed 's/\r$//' "$candidate" | grep -q '^PKG_NAME:=luci-app-adguardhome$'; then
                printf '%s\n' "$candidate"
                break
              fi
            done | head -n1)"
          package_src="${package_makefile%/Makefile}"

          if [ -z "$package_makefile" ] || [ ! -f "$package_makefile" ]; then
            echo "Unable to locate luci-app-adguardhome Makefile in workspace" >&2
            echo "Searched under $GITHUB_WORKSPACE for PKG_NAME:=luci-app-adguardhome" >&2
            exit 1
          fi

          sed 's/\r$//' "$package_makefile" | grep -q '^PKG_NAME:=luci-app-adguardhome$'

          sdk_feed_dir="$SDK_DIR/feeds/luci/applications/luci-app-adguardhome"
          sdk_pkg_dir="$SDK_DIR/package/feeds/luci/luci-app-adguardhome"

          mkdir -p "$SDK_DIR/feeds/luci/applications"
          mkdir -p "$SDK_DIR/package/feeds/luci"
          rm -rf "$sdk_feed_dir" "$sdk_pkg_dir"

          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'openwrt-sdk-*' \
            --exclude 'immortalwrt-sdk-*' \
            "$package_src/" "$sdk_feed_dir/"

          find "$sdk_feed_dir" -type f \( \
            -name Makefile -o \
            -name '*.sh' -o \
            -path '*/root/etc/init.d/*' -o \
            -path '*/root/etc/uci-defaults/*' -o \
            -path '*/root/usr/libexec/*' \
          \) -exec sed -i 's/\r$//' {} +

          ln -sfn "../../../feeds/luci/applications/luci-app-adguardhome" "$sdk_pkg_dir"
          test -f "$sdk_feed_dir/Makefile"
          test -f "$sdk_pkg_dir/Makefile"
          sed 's/\r$//' "$sdk_feed_dir/Makefile" | grep -q '^PKG_NAME:=luci-app-adguardhome$'

      - name: Install package definitions
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          ./scripts/feeds install -a

      - name: Configure SDK
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          package_po_dir="$SDK_DIR/feeds/luci/applications/luci-app-adguardhome/po"
          adguardhome_i18n_langs=''

          if [ -d "$package_po_dir" ]; then
            adguardhome_i18n_langs="$(find "$package_po_dir" -mindepth 2 -maxdepth 2 -type f -name '*.po' -printf '%h\n' | sed 's#^.*/##' | sort -u | tr '\n' ' ' | sed 's/[[:space:]]\+$//')"
          fi

          echo 'CONFIG_PACKAGE_luci-app-adguardhome=y' >> .config

          for lang in $adguardhome_i18n_langs; do
            echo "CONFIG_PACKAGE_luci-i18n-adguardhome-${lang}=y" >> .config
          done

          make defconfig

          {
            echo 'ADGUARDHOME_I18N_LANGS<<EOF'
            printf '%s\n' "$adguardhome_i18n_langs"
            echo 'EOF'
          } >> "$GITHUB_ENV"

          grep '^CONFIG_PACKAGE_luci-app-adguardhome=' .config
          grep '^CONFIG_PACKAGE_luci-i18n-adguardhome-' .config || true

      - name: Compile package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/feeds/luci/luci-app-adguardhome/compile -j"$(nproc)" V=s

      - name: Collect build artifacts
        run: |
          set -eux
          artifact_dir="$RUNNER_TEMP/luci-app-adguardhome-artifacts"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"

          pkg_ext=".${PKG_FORMAT:-apk}"
          find "$SDK_DIR/bin/packages" -type f \( \
            -name "luci-app-adguardhome*${pkg_ext}" \
            -o -name "luci-i18n-adguardhome*${pkg_ext}" \
            -o -path '*/luci/Packages*' \
          \) -exec cp -f {} "$artifact_dir/" \;

          if ! find "$artifact_dir" -maxdepth 1 -type f -name "luci-app-adguardhome*${pkg_ext}" | grep -q .; then
            echo "No luci-app-adguardhome ${pkg_ext} was produced by the build." >&2
            find "$SDK_DIR/bin/packages" -maxdepth 4 -type f | sort >&2
            exit 1
          fi

          if [ -n "${ADGUARDHOME_I18N_LANGS:-}" ]; then
            for lang in $ADGUARDHOME_I18N_LANGS; do
              if ! find "$artifact_dir" -maxdepth 1 -type f -name "luci-i18n-adguardhome-${lang}_*.${pkg_ext}" | grep -q .; then
                echo "No luci-i18n-adguardhome-${lang} ${pkg_ext} was produced by the build." >&2
                find "$SDK_DIR/bin/packages" -maxdepth 4 -type f | sort >&2
                exit 1
              fi
            done
          fi

          echo "ARTIFACT_DIR=$artifact_dir" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: luci-app-adguardhome-${{ env.BUILD_PROFILE }}-${{ env.SDK_DISTRIBUTION }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}
          path: ${{ env.ARTIFACT_DIR }}/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/adguardhome-v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)

    steps:
      - name: Determine release metadata
        id: meta
        run: |
          set -eu
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ]; then
            tag='${{ inputs.release_tag }}'
          else
            tag="$GITHUB_REF_NAME"
          fi

          if [ -z "$tag" ]; then
            echo 'release_tag is required when publishing from workflow_dispatch' >&2
            exit 1
          fi

          display_tag="$tag"
          case "$tag" in
            adguardhome-v*)
              display_tag="v${tag#adguardhome-v}"
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=luci-app-adguardhome $display_tag" >> "$GITHUB_OUTPUT"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          pattern: luci-app-adguardhome-*
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/**/*
          fail_on_unmatched_files: true
          body: |
            Build outputs:
            - ImmortalWrt 24.10.2 ipk
            - ImmortalWrt 25.12-SNAPSHOT apk

            Target: ${{ inputs.openwrt_target || 'mediatek' }}/${{ inputs.openwrt_subtarget || 'filogic' }}
            Package architecture: all
